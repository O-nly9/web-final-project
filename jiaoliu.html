<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>非遗文化 - 在线交流</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", SimSun, sans-serif;
            color: #333;
            background-color: #fcf9f4;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23dcd2c2' fill-opacity='0.2'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* 顶部导航 */
        .top-nav {
            background: linear-gradient(90deg, #3b6480, #507f9e);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 30px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.15);
            position: sticky;
            top: 0;
            z-index: 99;
        }

        .top-nav .logo {
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.2);
        }

        .top-nav .nav-links {
            display: flex;
            gap: 28px;
        }

        .top-nav .nav-links a {
            font-size: 16px;
            padding: 6px 12px;
            border-radius: 20px;
            transition: all 0.3s ease;
            position: relative;
        }

        .top-nav .nav-links a:hover {
            color: #ffd700;
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* 当前页面高亮 */
        .top-nav .nav-links a.active {
            color: #ffd700;
            background-color: rgba(255, 215, 0, 0.15);
        }

        .login-btn {
            font-size: 16px;
            cursor: pointer;
            padding: 7px 18px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            transition: all 0.3s;
        }

        .login-btn:hover {
            background-color: #ffd700;
            color: #333;
            border-color: #ffd700;
        }

        /* 头图横幅 */
        .hero {
            position: relative;
            height: 240px;
            background: linear-gradient(145deg, #4a7c9b 0%, #284f69 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }

        /* 古风云纹装饰 */
        .hero::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='140' height='140' viewBox='0 0 140 140' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M70 130c-33 0-60-27-60-60s27-60 60-60 60 27 60 60-27 60-60 60zm0-110c-27.6 0-50 22.4-50 50s22.4 50 50 50 50-22.4 50-50-22.4-50-50-50z' fill='rgba(255,255,255,0.06)'/%3E%3C/svg%3E");
            opacity: 0.6;
        }

        .hero-title {
            font-size: 52px;
            font-family: "KaiTi", STKaiti, serif;
            margin-bottom: 12px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.25);
            letter-spacing: 4px;
            z-index: 2;
        }

        .hero-subtitle {
            font-size: 20px;
            opacity: 0.92;
            letter-spacing: 1px;
            z-index: 2;
        }

        /* 主体内容 */
        .content {
            max-width: 820px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .contact-form {
            background: #fff;
            padding: 45px 50px;
            border-radius: 16px;
            box-shadow: 0 6px 24px rgba(74, 124, 155, 0.12);
            border: 1px solid rgba(220, 210, 194, 0.4);
            position: relative;
        }

        /* 表单角落小纹饰 */
        .contact-form::after {
            content: "";
            position: absolute;
            top: 12px;
            right: 12px;
            width: 60px;
            height: 60px;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,30 A30,30 0 0,1 30,0 L30,30 Z' fill='rgba(74,124,155,0.08)'/%3E%3C/svg%3E");
        }

        .form-group {
            margin-bottom: 28px;
        }

        .form-group label {
            display: block;
            font-size: 15px;
            color: #444;
            margin-bottom: 10px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 15px 18px;
            border: 1px solid #ddd8cf;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
            background-color: #fdfcfa;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4a7c9b;
            box-shadow: 0 0 0 3px rgba(74, 124, 155, 0.15);
            background-color: #fff;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 200px;
            line-height: 1.6;
        }

        .form-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 35px;
        }

        .btn {
            padding: 14px 48px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4a7c9b, #36627e);
            color: #fff;
            box-shadow: 0 4px 12px rgba(74, 124, 155, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(74, 124, 155, 0.35);
        }

        .btn-secondary {
            background: #f3efe9;
            color: #555;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e9e4dc;
            transform: translateY(-2px);
        }

        /* 页脚 */
        .footer {
            background: linear-gradient(90deg, #3b6480, #507f9e);
            color: #fff;
            text-align: center;
            padding: 25px;
            margin-top: 80px;
            font-size: 14px;
            box-shadow: 0 -3px 10px rgba(0, 0, 0, 0.08);
        }

        .footer p {
            letter-spacing: 1px;
            opacity: 0.9;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .top-nav {
                flex-direction: column;
                gap: 14px;
                padding: 15px 20px;
            }

            .top-nav .nav-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
            }

            .top-nav .nav-links a {
                font-size: 14px;
                padding: 5px 9px;
            }

            .hero {
                height: 200px;
            }

            .hero-title {
                font-size: 36px;
                letter-spacing: 2px;
            }

            .hero-subtitle {
                font-size: 17px;
            }

            .contact-form {
                padding: 30px 25px;
            }

            .form-actions {
                flex-direction: column;
                gap: 12px;
            }

            .btn {
                width: 100%;
                padding: 13px;
            }
        }
    </style>
</head>

<body>
    <div class="top-nav">
        <div class="logo" onclick="location.href='index.html'">非遗文化</div>
        <div class="nav-links">
            <a href="index.html">总首页</a>
            <a href="qinghuaci.html">青花瓷</a>
            <a href="zanhua.html">簪花</a>
            <a href="piyingxi.html">皮影戏</a>
            <a href="datiehua.html">打铁花</a>
            <a href="kunqu.html">昆曲</a>
            <a href="miaoxiu.html">苗绣</a>
            <a href="jiaoliu.html" class="active">在线交流</a>
        </div>
        <div class="login-btn" onclick="location.href='denglu.html'">登录 / 注册</div>
    </div>

    <div class="hero">
        <h1 class="hero-title">在线交流</h1>
        <p class="hero-subtitle">与非遗爱好者分享交流心得、探讨传统技艺</p>
    </div>

    <div class="content">
        <form class="contact-form">
            <div class="form-group">
                <label for="username">昵称</label>
                <input type="text" id="username" placeholder="请输入您的昵称">
            </div>
            <div class="form-group">
                <label for="email">联系邮箱</label>
                <input type="email" id="email" placeholder="方便我们回复您的留言">
            </div>
            <div class="form-group">
                <label for="message">留言内容</label>
                <textarea id="message" placeholder="分享您对非遗文化的见解、想学的技艺、疑问或者改进建议..."></textarea>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">提交留言</button>
                <button type="reset" class="btn btn-secondary">清空重填</button>
            </div>
        </form>
    </div>

    <footer class="footer">
        <p>©2026 中国非遗文化传播有限公司 版权所有</p>
    </footer>
</body>

</html>
